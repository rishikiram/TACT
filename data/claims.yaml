claims:
- uid: CLAIM-006
  statement: VER-101 gives better outcomes than standard-of-care comparator
  type: comparator

- uid: CLAIM-007
  statement: VER-101 gives better outcomes than direct comparator
  type: comparator

- uid: CLAIM-008
  statement: VER-101 gives better outcomes than placebo comparator
  type: comparator

- uid: CLAIM-009
  statement: VER-101 gives better outcomes than indirect comparator
  type: comparator

- uid: CLAIM-001
  statement: VER-101 demonstrates clinically meaningful tumor response in 2L KRAS G12C-positive metastatic NSCLC.
  risk_note: Single-arm ORR supports observed response but not comparative access claims.
  evidence_object_uids:
  - EO-004

- uid: CLAIM-002
  statement: VER-101 improves progression-free survival versus current standard of care.
  risk_note: No randomized comparator and no comparative PFS estimate.
  evidence_object_uids:
  - EO-003
  - EO-005

- uid: CLAIM-010
  statement: VER-101 improves overall survival.

- uid: CLAIM-003
  statement: VER-101 offers manageable safety and oral convenience.
  risk_note: Early safety and oral modality support a cautious statement, but comparative safety is unknown.
  evidence_object_uids:
  - EO-008
  - EO-011

- uid: CLAIM-004
  statement: VER-101 improves patient quality of life.
  risk_note: PROs are exploratory, incomplete, and not sufficient for a strong QoL improvement claim.
  evidence_object_uids:
  - EO-007

- uid: CLAIM-011
  statement: Patient Reported Outcomes support Quality of Life improvements.

- uid: CLAIM-005
  statement: VER-101's realted biomarker-defined population is clearly specified.
  risk_note: Population is defined, but testing pathway and comparative positioning remain uncertain.
  evidence_object_uids:
  - EO-002
  - EO-009

- uid: CLAIM-014
  statement: VER-101 biomarker testing pathway or assay assumptions are defined.

- uid: CLAIM-015
  statement: VER-101 subgroup analysis is sufficiently supported.

- uid: CLAIM-012
  statement: VER-101 produced a manageable amount adverse events.

- uid: CLAIM-013
  statement: An economic model or cost assesment has been developed
