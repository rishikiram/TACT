requirements:
- uid: REQ-NICE-COMP-001
  jurisdiction: NICE/England
  domain: Comparator
  requirement_text: Comparative access claims should be supported by evidence against a relevant comparator or by a justified indirect comparison.
  potential_gaps: Comparative evidence gap
  contractor_note: High priority. Should trigger a gap if VER-101 relies only on single-arm evidence.
  claim_uids:
  - CLAIM-006
  - CLAIM-007
  - CLAIM-008
  - CLAIM-009
- uid: REQ-US-COMP-001
  jurisdiction: U.S. payer evidence-risk archetype
  domain: Comparator
  requirement_text: Comparative clinical claims carry higher evidence risk when no head-to-head or credible indirect comparison exists.
  potential_gaps: Comparative evidence gap
  contractor_note: Use only as a high-level evidence-risk archetype.
  claim_uids:
  - CLAIM-006
  - CLAIM-007
  - CLAIM-008
  - CLAIM-009

- uid: REQ-NICE-ENDPT-001
  jurisdiction: NICE/England
  domain: Endpoint Maturity
  requirement_text: Survival, durability, and patient-relevant outcomes should be sufficiently mature to support value claims.
  potential_gaps: Endpoint maturity gap
  contractor_note: Relevant to immature OS and ORR-heavy evidence.
  claim_uids:
  - CLAIM-001
  - CLAIM-002
  - CLAIM-010
- uid: REQ-US-ENDPT-001
  jurisdiction: U.S. payer evidence-risk archetype
  domain: Endpoint Maturity
  requirement_text: Evidence risk increases when claims rely primarily on ORR or immature survival data.
  potential_gaps: Surrogate endpoint reliance gap
  contractor_note: Useful for flagging ORR-primary evidence limitations.
  claim_uids:
  - CLAIM-001
  - CLAIM-002
  - CLAIM-010

- uid: REQ-NICE-QOL-001
  jurisdiction: NICE/England
  domain: QoL/PRO
  requirement_text: Quality-of-life or patient-relevant outcome evidence should be available when survival benefit is uncertain or immature.
  potential_gaps: QoL/PRO evidence gap
  contractor_note: Should trigger if PRO evidence is exploratory or incomplete.
  claim_uids:
  - CLAIM-003
  - CLAIM-004
  - CLAIM-011
- uid: REQ-US-QOL-001
  jurisdiction: U.S. payer evidence-risk archetype
  domain: QoL/PRO
  requirement_text: Quality-of-life improvement claims should be supported by prespecified, interpretable, and sufficiently complete patient-reported outcome evidence.
  potential_gaps: Unsupported QoL claim gap
  contractor_note: Use especially for aggressive QoL claims.
  claim_uids:
  - CLAIM-003
  - CLAIM-004
  - CLAIM-011

- uid: REQ-US-BIOMARKER-001
  jurisdiction: U.S. payer evidence-risk archetype
  domain: Biomarker
  requirement_text: Biomarker-defined access claims should include clear population definition, testing assumptions, and subgroup support.
  potential_gaps: Biomarker/subgroup evidence gap
  contractor_note: Relevant to KRAS G12C-defined population and testing assumptions.
  claim_uids:
  - CLAIM-005
  - CLAIM-014
  - CLAIM-015
- uid: REQ-NICE-POP-001
  jurisdiction: NICE/England
  domain: Population
  requirement_text: The evaluated population should align clearly with the proposed indication and relevant clinical practice population.
  potential_gaps: Population alignment gap
  contractor_note: Useful if line of therapy or eligibility is ambiguous.
  claim_uids:
  - CLAIM-005

- uid: REQ-CLAIM-SUPPORT-001
  jurisdiction: Cross-jurisdiction
  domain: Claim support
  requirement_text: Each draft claim should be classified as supported, partially supported, unsupported, or assumption based on linked evidence.
  potential_gaps: Unsupported claim gap
  contractor_note: This is a general validation requirement.
  claim_uids: []
- uid: REQ-CLAIM-COMP-001
  jurisdiction: Cross-jurisdiction
  domain: Comparative claim support
  requirement_text: Superiority or comparative benefit claims require comparator-linked evidence.
  potential_gaps: Unsupported comparative claim gap
  contractor_note: Should flag claims like improved PFS versus standard of care if no comparator evidence exists.
  claim_uids: []
- uid: REQ-SAFETY-001
  jurisdiction: Cross-jurisdiction
  domain: Safety
  requirement_text: Safety and tolerability claims should be supported by observed adverse event data and should distinguish early evidence from mature safety evidence.
  potential_gaps: Safety maturity gap
  contractor_note: Allows cautious support for early safety while flagging maturity limits.
  claim_uids: []

- uid: REQ-NICE-ECON-001
  jurisdiction: NICE/England
  domain: Economic evidence
  requirement_text: Cost-effectiveness assessment requires inputs for comparative effectiveness, survival, quality of life, treatment duration, safety, and resource use.
  potential_gaps: Economic evidence readiness gap
  contractor_note: Should trigger if economic inputs are unavailable or underdeveloped.
  claim_uids:
  - CLAIM-013
- uid: REQ-US-ECON-001
  jurisdiction: U.S. payer evidence-risk archetype
  domain: Economic evidence
  requirement_text: Evidence packages should identify likely budget impact, eligible population, treatment duration, and comparator assumptions.
  potential_gaps: Budget impact evidence gap
  contractor_note: Use as high-level evidence-risk logic, not payer-specific guidance.
  claim_uids:
  - CLAIM-013

- uid: REQ-TRACE-001
  jurisdiction: Cross-jurisdiction
  domain: Traceability
  requirement_text: Each claim, gap, and handoff statement should link to a source, evidence object, requirement, or explicit assumption.
  potential_gaps: Source traceability gap
  contractor_note: Mandatory validation requirement.
  claim_uids: []
- uid: REQ-ASSUMPTION-001
  jurisdiction: Cross-jurisdiction
  domain: Assumption control
  requirement_text: Any conclusion not directly supported by source evidence should be labeled as an assumption or reviewer judgment.
  potential_gaps: Unsupported inference gap
  contractor_note: Mandatory hallucination/inference control requirement.
  claim_uids: []
- uid: REQ-REVIEW-001
  jurisdiction: Cross-jurisdiction
  domain: Human review
  requirement_text: Claims, gaps, requirement matches, and evidence actions should include a review status and reviewer rationale field.
  potential_gaps: Reviewability gap
  contractor_note: required to distinguish system-generated draft outputs from accepted reviewer conclusions.
  claim_uids: []
